services:
  trackkeep:
    image: ${TRACKKEEP_IMAGE:-${SPOTIFYBU_IMAGE:-ghcr.io/thedinz/spotifybu:dev}}
    pull_policy: always
    container_name: trackkeep
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${TRACKKEEP_PORT:-${SPOTIFYBU_PORT:-3000}}:3000"
    environment:
      MUSIC_LIBRARY_PATH: /music
      MUSIC_LIBRARY_URL: ${MUSIC_LIBRARY_URL:-${NAVIDROME_URL:-http://host.docker.internal:4533}}
      MUSIC_LIBRARY_USERNAME: ${MUSIC_LIBRARY_USERNAME:-${NAVIDROME_USERNAME:-}}
      MUSIC_LIBRARY_PASSWORD: ${MUSIC_LIBRARY_PASSWORD:-${NAVIDROME_PASSWORD:-}}
      NAVIDROME_URL: ${NAVIDROME_URL:-}
      NAVIDROME_USERNAME: ${NAVIDROME_USERNAME:-}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD:-}
      PLEX_SERVER_URL: ${PLEX_SERVER_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_MUSIC_LIBRARY_KEY: ${PLEX_MUSIC_LIBRARY_KEY:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
      PGID: ${PGID:-1000}
      PUID: ${PUID:-1000}
      TRACKKEEP_APP_SECRET: ${TRACKKEEP_APP_SECRET:-${SPOTIFYBU_APP_SECRET:?Set TRACKKEEP_APP_SECRET in .env before starting TrackKeep}}
      TRACKKEEP_AUTH_MODE: ${TRACKKEEP_AUTH_MODE:-${SPOTIFYBU_AUTH_MODE:-internal}}
      TRACKKEEP_CHOWN_MUSIC: ${TRACKKEEP_CHOWN_MUSIC:-${SPOTIFYBU_CHOWN_MUSIC:-false}}
      TRACKKEEP_CONFIG_DIR: /config
      TRACKKEEP_DATABASE_PATH: ${TRACKKEEP_DATABASE_PATH:-${SPOTIFYBU_DATABASE_PATH:-}}
      TRACKKEEP_SECURE_COOKIES: ${TRACKKEEP_SECURE_COOKIES:-${SPOTIFYBU_SECURE_COOKIES:-false}}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
    volumes:
      - spotifybu_config:/config
      - ${MUSIC_LIBRARY_HOST_PATH:-${NAVIDROME_MUSIC_PATH:?Set NAVIDROME_MUSIC_PATH or MUSIC_LIBRARY_HOST_PATH to your host music folder}}:/music

volumes:
  spotifybu_config:
