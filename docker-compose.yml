services:
  spotifybu:
    image: ${SPOTIFYBU_IMAGE:-ghcr.io/thedinz/spotifybu:dev}
    pull_policy: always
    container_name: spotifybu
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SPOTIFYBU_PORT:-3000}:3000"
    environment:
      MUSIC_LIBRARY_PATH: /music
      MUSIC_LIBRARY_URL: ${MUSIC_LIBRARY_URL:-${NAVIDROME_URL:-http://host.docker.internal:4533}}
      MUSIC_LIBRARY_USERNAME: ${MUSIC_LIBRARY_USERNAME:-${NAVIDROME_USERNAME:-}}
      MUSIC_LIBRARY_PASSWORD: ${MUSIC_LIBRARY_PASSWORD:-${NAVIDROME_PASSWORD:-}}
      NAVIDROME_URL: ${NAVIDROME_URL:-}
      NAVIDROME_USERNAME: ${NAVIDROME_USERNAME:-}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
      PGID: ${PGID:-1000}
      PUID: ${PUID:-1000}
      SPOTIFYBU_APP_SECRET: ${SPOTIFYBU_APP_SECRET:?Set SPOTIFYBU_APP_SECRET in .env before starting SpotifyBU}
      SPOTIFYBU_AUTH_MODE: ${SPOTIFYBU_AUTH_MODE:-internal}
      SPOTIFYBU_CHOWN_MUSIC: ${SPOTIFYBU_CHOWN_MUSIC:-false}
      SPOTIFYBU_CONFIG_DIR: /config
      SPOTIFYBU_SECURE_COOKIES: ${SPOTIFYBU_SECURE_COOKIES:-false}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
    volumes:
      - spotifybu_config:/config
      - ${MUSIC_LIBRARY_HOST_PATH:-${NAVIDROME_MUSIC_PATH:?Set NAVIDROME_MUSIC_PATH or MUSIC_LIBRARY_HOST_PATH to your host music folder}}:/music

volumes:
  spotifybu_config:
