services:
  spotifybu:
    image: ${SPOTIFYBU_IMAGE:-ghcr.io/thedinz/spotifybu:dev}
    pull_policy: always
    container_name: spotifybu
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SPOTIFYBU_PORT:-3000}:3000"
    environment:
      NAVIDROME_LIBRARY_PATH: /music
      NAVIDROME_URL: ${NAVIDROME_URL:-http://host.docker.internal:4533}
      NAVIDROME_USERNAME: ${NAVIDROME_USERNAME:-}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
      SPOTIFYBU_APP_SECRET: ${SPOTIFYBU_APP_SECRET:?Set SPOTIFYBU_APP_SECRET in .env before starting SpotifyBU}
      SPOTIFYBU_CONFIG_DIR: /config
      SPOTIFYBU_SECURE_COOKIES: ${SPOTIFYBU_SECURE_COOKIES:-false}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
    volumes:
      - spotifybu_config:/config
      - ${NAVIDROME_MUSIC_PATH:?Set NAVIDROME_MUSIC_PATH to your host Navidrome music folder}:/music

volumes:
  spotifybu_config:
